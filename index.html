<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disney Pixar Cars 3 Racing</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;font-family:'Arial Black',Arial,sans-serif;color:#fff;overflow-x:hidden}
.screen{display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column}
.screen.active{display:flex}

/* INTRO */
#intro{background:radial-gradient(ellipse at center,#1a0500,#0a0a1a)}
.logo-disney{font-size:18px;letter-spacing:8px;color:#ccc;margin-bottom:4px;text-align:center}
.logo-cars{font-size:clamp(70px,15vw,130px);font-weight:900;color:#c8000a;text-shadow:0 0 40px #ff4400,4px 4px 0 #800000;line-height:1;display:inline}
.logo-3{font-size:clamp(80px,17vw,150px);color:#c0c0c0;text-shadow:4px 4px 0 #555;display:inline;transform:rotate(-8deg) translateY(10px);position:relative;top:10px}
.subtitle{font-size:16px;color:#ffd700;letter-spacing:5px;margin:20px 0 36px}
.btn-big{padding:18px 60px;font-size:20px;font-weight:900;font-family:'Arial Black',Arial,sans-serif;background:#c8000a;color:#fff;border:3px solid #ffd700;border-radius:50px;cursor:pointer;letter-spacing:3px;text-transform:uppercase;transition:transform .15s,box-shadow .15s}
.btn-big:hover{transform:scale(1.07);box-shadow:0 0 30px rgba(255,215,0,.6)}

/* SELECT */
#select{background:#060610;padding:20px;justify-content:flex-start;padding-top:24px}
.sel-title{font-size:clamp(20px,5vw,36px);color:#ffd700;letter-spacing:3px;margin-bottom:6px}
.sel-sub{color:#888;font-size:13px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;max-width:1080px;width:100%;padding:0 8px}
.card{background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.1);border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.card:hover{border-color:#ffd700;background:rgba(255,215,0,.1);transform:translateY(-3px)}
.card.picked{border-color:#ffd700;background:rgba(255,215,0,.18);box-shadow:0 0 16px rgba(255,215,0,.5)}
.card-emoji{font-size:40px;display:block;margin-bottom:6px}
.card-name{font-size:11px;font-weight:700;color:#fff;line-height:1.3}
.card-num{font-size:10px;color:#ffd700;margin-top:2px}
.card-bars{display:flex;gap:4px;justify-content:center;margin-top:7px}
.bar{flex:1;max-width:26px;height:3px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px}
.tick{position:absolute;top:5px;right:7px;font-size:13px;display:none}
.card.picked .tick{display:block}
.btn-go{margin-top:20px;margin-bottom:20px;padding:14px 50px;font-size:18px;font-weight:900;font-family:'Arial Black',Arial,sans-serif;background:#ffd700;color:#1a0a00;border:none;border-radius:50px;cursor:pointer;letter-spacing:2px;text-transform:uppercase;opacity:.35;pointer-events:none;transition:all .2s}
.btn-go.on{opacity:1;pointer-events:all;animation:glow 1.4s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 4px 16px rgba(255,215,0,.3)}50%{box-shadow:0 4px 28px rgba(255,215,0,.8)}}

/* RACE */
#race{background:#000;padding:0;justify-content:flex-start}
.hud{width:100%;background:rgba(0,0,0,.9);padding:8px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #ffd700;flex-shrink:0}
.hud-box{text-align:center}
.hud-lbl{font-size:9px;color:#666;letter-spacing:2px}
.hud-val{font-size:clamp(14px,3vw,22px);font-weight:900}
.raceview{flex:1;width:100%;position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%}
.mctrl{display:none;width:100%;background:rgba(0,0,0,.92);padding:10px 14px;border-top:2px solid #222;gap:10px;flex-shrink:0}
@media(max-width:768px){.mctrl{display:flex}}
.cb{flex:1;padding:15px 6px;font-size:18px;font-weight:900;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:10px;color:#fff;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:background .1s}
.cb:active,.cb.active{background:rgba(255,215,0,.3);border-color:#ffd700}
.cb.gas{background:rgba(200,0,10,.2);border-color:#c8000a}
.cb.gas:active,.cb.gas.active{background:rgba(200,0,10,.5)}

/* RESULT */
#result{background:radial-gradient(ellipse at center,#0d1a0a,#050510);text-align:center;padding:30px 20px}
.trophy{font-size:80px;animation:rock 2s ease-in-out infinite alternate}
@keyframes rock{from{transform:rotate(-10deg)}to{transform:rotate(10deg)}}
.res-title{font-size:clamp(26px,7vw,52px);font-weight:900;margin:14px 0 6px}
.res-title.w{color:#ffd700;text-shadow:0 0 24px #ffd700}
.res-title.l{color:#ff4400}
.res-grid{display:flex;gap:16px;justify-content:center;margin:20px 0;flex-wrap:wrap}
.res-box{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px 22px;min-width:90px}
.res-val{font-size:26px;font-weight:900;color:#ffd700}
.res-lbl{font-size:10px;color:#888;margin-top:3px;letter-spacing:2px}
.res-btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:18px}
.btn-again{padding:13px 38px;font-size:15px;font-weight:900;font-family:'Arial Black',Arial,sans-serif;background:#c8000a;color:#fff;border:2px solid #ffd700;border-radius:50px;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:transform .15s}
.btn-chg{padding:13px 38px;font-size:15px;font-weight:900;font-family:'Arial Black',Arial,sans-serif;background:transparent;color:#ffd700;border:2px solid #ffd700;border-radius:50px;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:transform .15s}
.btn-again:hover,.btn-chg:hover{transform:scale(1.05)}

/* COUNTDOWN */
#cdover{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;z-index:200;font-size:clamp(90px,25vw,200px);font-weight:900;color:#ffd700;text-shadow:0 0 40px #ffd700}
#cdover.show{display:flex}
</style>
</head>
<body>

<div id="intro" class="screen active">
  <div class="logo-disney">DISNEY · PIXAR</div>
  <div><span class="logo-cars">Cars</span><span class="logo-3">3</span></div>
  <div class="subtitle">🏁 RACING CHAMPIONSHIP 🏁</div>
  <button class="btn-big" id="btnStart">START GAME</button>
</div>

<div id="select" class="screen">
  <div class="sel-title">🏎️ CHOOSE YOUR CAR</div>
  <div class="sel-sub">Pick your racer — each has unique stats</div>
  <div class="grid" id="carGrid"></div>
  <button class="btn-go" id="btnGo">🏁 RACE!</button>
</div>

<div id="race" class="screen">
  <div class="hud">
    <div class="hud-box"><div class="hud-lbl">LAP</div><div class="hud-val" id="hLap" style="color:#fff">1/3</div></div>
    <div class="hud-box"><div class="hud-lbl">SPEED</div><div class="hud-val" id="hSpd" style="color:#ffd700">0</div></div>
    <div class="hud-box"><div id="hEmoji" style="font-size:36px">🏎️</div></div>
    <div class="hud-box"><div class="hud-lbl">POS</div><div class="hud-val" id="hPos" style="color:#ff4400">1st</div></div>
    <div class="hud-box"><div class="hud-lbl">TIME</div><div class="hud-val" id="hTime" style="color:#fff">0:00</div></div>
  </div>
  <div class="raceview"><canvas id="cv"></canvas></div>
  <div class="mctrl" id="mctrl">
    <button class="cb" id="cLeft">◀ LEFT</button>
    <button class="cb gas" id="cGas">⛽ GAS</button>
    <button class="cb" id="cBrk">🛑 BRAKE</button>
    <button class="cb" id="cRight">RIGHT ▶</button>
  </div>
</div>

<div id="result" class="screen">
  <div class="trophy" id="rTrophy">🏆</div>
  <div class="res-title" id="rTitle">YOU WIN!</div>
  <div id="rEmoji" style="font-size:56px;margin:8px 0"></div>
  <div class="res-grid">
    <div class="res-box"><div class="res-val" id="rPos">1st</div><div class="res-lbl">POSITION</div></div>
    <div class="res-box"><div class="res-val" id="rTime">0:00</div><div class="res-lbl">TIME</div></div>
    <div class="res-box"><div class="res-val" id="rLaps">3</div><div class="res-lbl">LAPS</div></div>
  </div>
  <div class="res-btns">
    <button class="btn-again" id="btnAgain">🔁 RACE AGAIN</button>
    <button class="btn-chg" id="btnChg">🚗 CHANGE CAR</button>
  </div>
</div>

<div id="cdover"></div>

<script>
// ── CARS ──────────────────────────────────────────────────────────────────────
var CARS=[
  {name:"Lightning McQueen",num:"#95",e:"🏎️",c:"#c8000a",spd:9,hdl:7,bst:9},
  {name:"Mater",num:"TOW",e:"🚜",c:"#8B6914",spd:5,hdl:6,bst:7},
  {name:"Sally Carrera",num:"",e:"🩵",c:"#4a90d9",spd:7,hdl:9,bst:6},
  {name:"Doc Hudson",num:"#51",e:"🔵",c:"#1a3a6e",spd:8,hdl:8,bst:7},
  {name:"Jackson Storm",num:"#20",e:"🖤",c:"#2a2a3e",spd:10,hdl:8,bst:10},
  {name:"Cruz Ramirez",num:"#51",e:"💛",c:"#c8a800",spd:9,hdl:9,bst:8},
  {name:"Chick Hicks",num:"#86",e:"💚",c:"#1a6e1a",spd:8,hdl:7,bst:7},
  {name:"The King",num:"#43",e:"💙",c:"#1a4a8e",spd:8,hdl:8,bst:7},
  {name:"Mack",num:"MACK",e:"🚛",c:"#c8000a",spd:4,hdl:5,bst:5},
  {name:"Ramone",num:"",e:"🟣",c:"#6a1a8e",spd:6,hdl:8,bst:6},
  {name:"Flo",num:"",e:"🟡",c:"#d4a010",spd:6,hdl:8,bst:7},
  {name:"Luigi",num:"",e:"🟢",c:"#1a7a1a",spd:6,hdl:7,bst:6},
  {name:"Guido",num:"",e:"🔵",c:"#1a5e9e",spd:5,hdl:6,bst:8},
  {name:"Fillmore",num:"",e:"🌿",c:"#4a8e1a",spd:5,hdl:6,bst:6},
  {name:"Sarge",num:"",e:"🟫",c:"#4a6e1a",spd:6,hdl:7,bst:6},
  {name:"Sheriff",num:"",e:"⬛",c:"#2a2a2a",spd:6,hdl:7,bst:5},
  {name:"Strip Weathers",num:"#43",e:"🔷",c:"#1a5a8e",spd:8,hdl:8,bst:7},
  {name:"Smokey",num:"",e:"🟤",c:"#6e4a1a",spd:7,hdl:9,bst:7},
  {name:"Miss Fritter",num:"",e:"🚌",c:"#c87800",spd:6,hdl:5,bst:9},
  {name:"Bobby Swift",num:"",e:"🟣",c:"#7a1a8e",spd:8,hdl:7,bst:8},
  {name:"Cam Spinner",num:"",e:"🟡",c:"#c8a200",spd:8,hdl:8,bst:8},
  {name:"Ryan Laney",num:"",e:"💜",c:"#6a1a9e",spd:8,hdl:7,bst:8},
  {name:"Natalie Certain",num:"",e:"🟨",c:"#b89000",spd:7,hdl:7,bst:7},
  {name:"Brick Yardley",num:"",e:"🟠",c:"#b86400",spd:7,hdl:7,bst:7},
  {name:"Daniel Swervez",num:"",e:"🔹",c:"#1a6e9e",spd:8,hdl:8,bst:7},
  {name:"Chuki",num:"",e:"🔴",c:"#8e1a1a",spd:7,hdl:7,bst:7},
  {name:"Dave Rubins",num:"",e:"🟩",c:"#1a8e4a",spd:7,hdl:7,bst:7},
];

// ── AUDIO ─────────────────────────────────────────────────────────────────────
var AC=null;
function ac(){
  if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}
  if(AC.state==='suspended'){try{AC.resume();}catch(e){}}
  return AC;
}
function tone(f,t,d,v,det){
  try{
    var ctx=ac(); if(!ctx) return;
    var o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type=t||'sine'; o.frequency.value=f||440;
    if(det) o.detune.value=det;
    g.gain.setValueAtTime(v||0.3,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+d);
    o.start(); o.stop(ctx.currentTime+d+0.01);
  }catch(e){}
}
function sndSelect(){tone(440,'sine',.12,.25);setTimeout(function(){tone(660,'sine',.12,.25);},90);}
function sndBeep(n){if(n>0)tone(440,'sine',.25,.45);else{tone(880,'sine',.08,.45);setTimeout(function(){tone(1100,'sine',.08,.45);},90);setTimeout(function(){tone(1320,'sine',.15,.45);},180);}}
function sndCrash(){tone(180,'sawtooth',.25,.4);tone(140,'sawtooth',.3,.3,80);}
function sndBoost(){tone(300,'sawtooth',.04,.2);setTimeout(function(){tone(500,'sawtooth',.04,.2);},45);setTimeout(function(){tone(700,'sawtooth',.1,.22);},90);}
function sndLap(){tone(880,'sine',.08,.4);setTimeout(function(){tone(1100,'sine',.12,.4);},90);}
function sndWin(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){tone(f,'sine',.28,.4);},i*140);});}
function sndLose(){[300,250,200].forEach(function(f,i){setTimeout(function(){tone(f,'sawtooth',.28,.3);},i*180);});}
function sndEngine(spd){
  try{
    var ctx=ac(); if(!ctx) return;
    var b=55+spd*17;
    var o=ctx.createOscillator(),o2=ctx.createOscillator(),g=ctx.createGain();
    var ws=ctx.createWaveShaper();
    var cv=new Float32Array(256);
    for(var i=0;i<256;i++) cv[i]=(i<128)?(-1+i/64):((i-128)/64);
    ws.curve=cv;
    o.connect(ws);o2.connect(ws);ws.connect(g);g.connect(ctx.destination);
    o.type='sawtooth';o.frequency.value=b;
    o2.type='square';o2.frequency.value=b*1.5;
    g.gain.setValueAtTime(0.07,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.11);
    o.start();o.stop(ctx.currentTime+0.12);
    o2.start();o2.stop(ctx.currentTime+0.12);
  }catch(e){}
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}
function ord(n){return['','1st','2nd','3rd','4th','5th','6th','7th','8th'][n]||n+'th';}
function fmt(ms){var s=Math.floor(ms/1000),m=Math.floor(s/60);return m+':'+(s%60<10?'0':'')+(s%60);}

// ── CAR SELECT ────────────────────────────────────────────────────────────────
var picked=null;
function buildGrid(){
  var g=document.getElementById('carGrid'); g.innerHTML='';
  CARS.forEach(function(c,i){
    var d=document.createElement('div');
    d.className='card'+(picked&&picked.name===c.name?' picked':'');
    d.innerHTML='<span class="tick">✓</span>'
      +'<span class="card-emoji">'+c.e+'</span>'
      +'<div class="card-name">'+c.name+'</div>'
      +'<div class="card-num">'+c.num+'</div>'
      +'<div class="card-bars">'
        +'<div class="bar"><div class="bar-fill" style="width:'+c.spd*10+'%;background:#c8000a"></div></div>'
        +'<div class="bar"><div class="bar-fill" style="width:'+c.hdl*10+'%;background:#1a6e9e"></div></div>'
        +'<div class="bar"><div class="bar-fill" style="width:'+c.bst*10+'%;background:#1a8e4a"></div></div>'
      +'</div>';
    d.addEventListener('click',function(){
      ac();
      picked=c;
      document.querySelectorAll('.card').forEach(function(x){x.classList.remove('picked');});
      d.classList.add('picked');
      var btn=document.getElementById('btnGo');
      btn.classList.add('on');
      btn.textContent='🏁 RACE AS '+c.name.split(' ')[0].toUpperCase()+'!';
      sndSelect();
    });
    g.appendChild(d);
  });
}

// ── BUTTON WIRING ─────────────────────────────────────────────────────────────
document.getElementById('btnStart').addEventListener('click',function(){
  ac();
  buildGrid();
  show('select');
});
document.getElementById('btnGo').addEventListener('click',function(){
  if(!picked) return;
  startRace();
});
document.getElementById('btnAgain').addEventListener('click',function(){startRace();});
document.getElementById('btnChg').addEventListener('click',function(){buildGrid();show('select');});

// ── MOBILE CONTROLS ───────────────────────────────────────────────────────────
var K={up:false,left:false,right:false,brk:false};
function wire(id,key){
  var el=document.getElementById(id);
  ['touchstart','mousedown'].forEach(function(ev){
    el.addEventListener(ev,function(e){e.preventDefault();K[key]=true;el.classList.add('active');ac();},{passive:false});
  });
  ['touchend','mouseup','touchcancel','mouseleave'].forEach(function(ev){
    el.addEventListener(ev,function(){K[key]=false;el.classList.remove('active');});
  });
}
wire('cLeft','left'); wire('cGas','up'); wire('cBrk','brk'); wire('cRight','right');

document.addEventListener('keydown',function(e){
  if(e.code==='ArrowUp'||e.code==='KeyW'){K.up=true;e.preventDefault();}
  if(e.code==='ArrowLeft'||e.code==='KeyA'){K.left=true;e.preventDefault();}
  if(e.code==='ArrowRight'||e.code==='KeyD'){K.right=true;e.preventDefault();}
  if(e.code==='ArrowDown'||e.code==='KeyS'){K.brk=true;e.preventDefault();}
});
document.addEventListener('keyup',function(e){
  if(e.code==='ArrowUp'||e.code==='KeyW') K.up=false;
  if(e.code==='ArrowLeft'||e.code==='KeyA') K.left=false;
  if(e.code==='ArrowRight'||e.code==='KeyD') K.right=false;
  if(e.code==='ArrowDown'||e.code==='KeyS') K.brk=false;
});

// ── RACE ──────────────────────────────────────────────────────────────────────
var RAF=null, RS={}, LAPS=3, OPP_N=5, RW=560;

function startRace(){
  if(!picked) return;
  if(RAF) cancelAnimationFrame(RAF);
  show('race');

  var cv=document.getElementById('cv');
  cv.width=cv.offsetWidth||window.innerWidth;
  cv.height=cv.offsetHeight||(window.innerHeight-140);

  document.getElementById('hEmoji').textContent=picked.e;

  RS={
    lap:1, prog:0, spd:0,
    maxSpd: 3+picked.spd*0.5,
    acc: 0.055+picked.spd*0.005,
    hdl: picked.hdl,
    x: cv.width/2, y: cv.height*0.75,
    angle:0, bgOff:0,
    t0:null, total:0,
    boost:0, crash:0, rumble:0, spin:0,
    engT:0, done:false,
    coins:[], oils:[], opps:[],
    pos:1,
  };

  for(var i=0;i<OPP_N;i++){
    var oc=CARS.filter(function(c){return c.name!==picked.name;})[Math.floor(Math.random()*(CARS.length-1))];
    RS.opps.push({car:oc,prog:0,x:cv.width/2+(Math.random()-.5)*200,spd:1.8+Math.random()*2.2,lane:(Math.random()-.5)*160,wb:Math.random()*6.28,done:false});
  }
  for(var j=0;j<12;j++) RS.coins.push({x:cv.width/2+(Math.random()-.5)*280,ry:Math.random(),hit:false,a:0});
  for(var k=0;k<5;k++) RS.oils.push({x:cv.width/2+(Math.random()-.5)*240,ry:Math.random()*0.8+0.1,on:true});

  var n=3, cd=document.getElementById('cdover');
  cd.textContent=n; cd.className='show'; sndBeep(n);
  var iv=setInterval(function(){
    n--;
    if(n>0){cd.textContent=n;sndBeep(n);}
    else{
      cd.textContent='GO!';
      sndBeep(0);
      clearInterval(iv);
      setTimeout(function(){
        cd.className='';
        RS.t0=performance.now();
        RAF=requestAnimationFrame(loop);
      },650);
    }
  },1000);
}

function loop(){
  var cv=document.getElementById('cv');
  cv.width=cv.offsetWidth||window.innerWidth;
  cv.height=cv.offsetHeight||(window.innerHeight-140);
  update(cv);
  draw(cv, cv.getContext('2d'));
  if(!RS.done) RAF=requestAnimationFrame(loop);
}

function update(cv){
  var W=cv.width, H=cv.height;
  RS.total=performance.now()-RS.t0;
  if(RS.spin>0){RS.spin--;RS.angle+=0.14;return;}

  var a=RS.boost>0?RS.acc*1.8:RS.acc;
  var mx=RS.boost>0?RS.maxSpd*1.5:RS.maxSpd;
  if(K.up) RS.spd=Math.min(RS.spd+a,mx);
  else if(K.brk) RS.spd=Math.max(RS.spd-a*2.2,0);
  else RS.spd=Math.max(RS.spd-a*0.35,0);
  if(RS.boost>0) RS.boost--;

  if(K.left){RS.x-=RS.spd*2.6;RS.angle=-0.28;}
  else if(K.right){RS.x+=RS.spd*2.6;RS.angle=0.28;}
  else RS.angle*=0.72;

  var rl=W/2-RW/2+44, rr=W/2+RW/2-44;
  if(RS.x<rl){RS.x=rl;RS.spd*=0.65;if(RS.crash<=0){sndCrash();RS.crash=28;RS.rumble=18;}}
  if(RS.x>rr){RS.x=rr;RS.spd*=0.65;if(RS.crash<=0){sndCrash();RS.crash=28;RS.rumble=18;}}
  if(RS.crash>0) RS.crash--;
  if(RS.rumble>0) RS.rumble--;

  RS.prog+=RS.spd*0.003;
  RS.bgOff=(RS.bgOff+RS.spd*2)%H;

  if(RS.prog>=100){
    RS.prog=0; RS.lap++;
    sndLap();
    if(RS.lap>LAPS){
      RS.done=true;
      var pos=1+RS.opps.filter(function(o){return o.prog>=100*LAPS;}).length;
      RS.pos=pos;
      setTimeout(function(){showResult(pos===1,pos,RS.total,LAPS);},700);
      return;
    }
  }

  RS.engT++;
  if(RS.engT>=Math.max(4,14-Math.floor(RS.spd))){RS.engT=0;sndEngine(RS.spd);}

  RS.opps.forEach(function(op){
    op.wb+=0.04;
    op.x=W/2+op.lane+Math.sin(op.wb)*18;
    op.prog+=op.spd*0.003;
    if(op.prog>=100*LAPS) op.done=true;
  });

  RS.coins.forEach(function(c){
    if(c.hit) return; c.a++;
    var sy=H*0.5+(((c.ry*600-RS.bgOff)%600+600)%600)*(H*0.5/600);
    if(Math.abs(RS.x-c.x)<28&&Math.abs(H*0.75-sy)<38){c.hit=true;RS.boost=85;sndBoost();}
  });
  RS.oils.forEach(function(o){
    if(!o.on) return;
    var sy=H*0.5+(((o.ry*600-RS.bgOff)%600+600)%600)*(H*0.5/600);
    if(Math.abs(RS.x-o.x)<34&&Math.abs(H*0.75-sy)<34){o.on=false;RS.spin=38;sndCrash();}
  });

  var ahead=RS.opps.filter(function(op){return op.prog>(RS.prog+(RS.lap-1)*100);}).length;
  RS.pos=ahead+1;
  document.getElementById('hSpd').textContent=Math.round(RS.spd*30)+' MPH';
  document.getElementById('hLap').textContent=Math.min(RS.lap,LAPS)+'/'+LAPS;
  document.getElementById('hPos').textContent=ord(RS.pos);
  document.getElementById('hTime').textContent=fmt(RS.total);
}

function draw(cv,ctx){
  var W=cv.width, H=cv.height;
  ctx.clearRect(0,0,W,H);

  // Sky
  var sk=ctx.createLinearGradient(0,0,0,H*0.48);
  sk.addColorStop(0,'#150820'); sk.addColorStop(1,'#3a1500');
  ctx.fillStyle=sk; ctx.fillRect(0,0,W,H*0.48);

  // Stars
  ctx.fillStyle='rgba(255,255,255,.55)';
  for(var i=0;i<28;i++) ctx.fillRect(((i*139+RS.bgOff*0.015)%W),(i*71)%(H*0.38),1.5,1.5);

  // Horizon
  ctx.fillStyle='rgba(210,90,0,.2)'; ctx.fillRect(0,H*0.42,W,H*0.08);

  // Grass
  ctx.fillStyle='#0a1a05'; ctx.fillRect(0,H*0.46,W,H*0.54);

  // Road
  var rx=W/2-RW/2;
  var rg=ctx.createLinearGradient(0,H*0.46,0,H);
  rg.addColorStop(0,'#2e2e2e'); rg.addColorStop(1,'#1a1a1a');
  ctx.fillStyle=rg; ctx.fillRect(rx,H*0.46,RW,H*0.54);

  // Center dashes
  ctx.strokeStyle='rgba(255,255,255,.65)'; ctx.lineWidth=3;
  ctx.setLineDash([38,28]); ctx.lineDashOffset=-(RS.bgOff%66);
  ctx.beginPath(); ctx.moveTo(W/2,H*0.46); ctx.lineTo(W/2,H); ctx.stroke();
  ctx.setLineDash([]);

  // Road edges
  ctx.strokeStyle='#ffd700'; ctx.lineWidth=4;
  ctx.strokeRect(rx+4,H*0.46,RW-8,H*0.54);

  // Rumble flash
  if(RS.rumble>0){ctx.fillStyle='rgba(255,70,0,'+(RS.rumble/18*0.35)+')';ctx.fillRect(0,0,W,H);}

  // Coins
  RS.coins.forEach(function(c){
    if(c.hit) return;
    var sy=H*0.5+(((c.ry*600-RS.bgOff)%600+600)%600)*(H*0.5/600);
    if(sy<H*0.46||sy>H) return;
    var sc=0.38+(sy-H*0.46)/(H*0.54)*0.62;
    var cx=W/2+(c.x-W/2)*sc;
    ctx.save(); ctx.translate(cx,sy); ctx.scale(sc,sc);
    ctx.font='19px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('⚡',0,0); ctx.restore();
  });

  // Oil slicks
  RS.oils.forEach(function(o){
    if(!o.on) return;
    var sy=H*0.5+(((o.ry*600-RS.bgOff)%600+600)%600)*(H*0.5/600);
    if(sy<H*0.46||sy>H) return;
    var sc=0.38+(sy-H*0.46)/(H*0.54)*0.62;
    var cx=W/2+(o.x-W/2)*sc;
    ctx.save(); ctx.translate(cx,sy); ctx.scale(sc,sc);
    ctx.fillStyle='rgba(70,10,110,.72)';
    ctx.beginPath(); ctx.ellipse(0,0,22,9,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Opponents
  RS.opps.forEach(function(op){
    var rel=op.prog-(RS.lap-1)*100, plr=RS.prog, diff=plr-rel;
    if(diff<-5||diff>55) return;
    var sy=H*0.75-diff*4.8;
    if(sy<H*0.46||sy>H+20) return;
    var sc=0.32+(sy-H*0.46)/(H*0.54)*0.68;
    var cx=W/2+(op.x-W/2)*sc;
    drawCar(ctx,cx,sy,sc,op.car.e,op.car.c,0);
  });

  // Player
  var shk=RS.rumble>0?(Math.random()-.5)*5:0;
  drawCar(ctx,RS.x+shk,H*0.75+shk,1,picked.e,picked.c,RS.angle);

  // Boost flame
  if(RS.boost>0){
    ctx.save(); ctx.translate(RS.x,H*0.75+26);
    ctx.font=(16+Math.random()*7|0)+'px serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🔥',0,0); ctx.restore();
  }

  // Minimap
  var mx=W-86,my=14,mw=72,mh=72;
  ctx.fillStyle='rgba(0,0,0,.72)';
  ctx.beginPath(); ctx.roundRect(mx,my,mw,mh,8); ctx.fill();
  ctx.strokeStyle='#ffd700'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.strokeStyle='#444'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.arc(mx+mw/2,my+mh/2,25,0,Math.PI*2); ctx.stroke();
  var ang=(RS.prog/100)*Math.PI*2-Math.PI/2;
  var px=mx+mw/2+Math.cos(ang)*25, py=my+mh/2+Math.sin(ang)*25;
  ctx.fillStyle='#ffd700'; ctx.beginPath(); ctx.arc(px,py,5,0,Math.PI*2); ctx.fill();
  RS.opps.forEach(function(op){
    var oa=(op.prog/100)*Math.PI*2-Math.PI/2;
    ctx.fillStyle=op.car.c||'#f00';
    ctx.beginPath(); ctx.arc(mx+mw/2+Math.cos(oa)*25,my+mh/2+Math.sin(oa)*25,3,0,Math.PI*2); ctx.fill();
  });
  ctx.fillStyle='#aaa'; ctx.font='9px Arial'; ctx.textAlign='center';
  ctx.fillText('LAP '+Math.min(RS.lap,LAPS),mx+mw/2,my+mh+13);
}

function drawCar(ctx,x,y,sc,em,col,ang){
  ctx.save(); ctx.translate(x,y); ctx.scale(sc,sc); ctx.rotate(ang*0.28);
  ctx.fillStyle='rgba(0,0,0,.3)';
  ctx.beginPath(); ctx.ellipse(0,17,21,7,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=col;
  ctx.beginPath(); ctx.roundRect(-20,-12,40,24,7); ctx.fill();
  ctx.fillStyle='rgba(140,215,255,.65)'; ctx.fillRect(-8,-10,17,10);
  ctx.fillStyle='#111';
  [[-15,-13],[15,-13],[-15,13],[15,13]].forEach(function(p){
    ctx.beginPath(); ctx.ellipse(p[0],p[1],5,4,0,0,Math.PI*2); ctx.fill();
  });
  ctx.font=Math.round(21*sc)+'px serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(em,0,-1);
  ctx.restore();
}

function showResult(won,pos,time,laps){
  document.getElementById('rTrophy').textContent=won?'🏆':'🎖️';
  var t=document.getElementById('rTitle');
  t.textContent=won?'🏆 YOU WIN! 🏆':'😤 RACE OVER';
  t.className='res-title '+(won?'w':'l');
  document.getElementById('rEmoji').textContent=picked?picked.e:'🏎️';
  document.getElementById('rPos').textContent=ord(pos);
  document.getElementById('rTime').textContent=fmt(time);
  document.getElementById('rLaps').textContent=laps;
  show('result');
  if(won) sndWin(); else sndLose();
}

// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.beginPath();
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);
    this.closePath(); return this;
  };
}
window.addEventListener('resize',function(){
  if(RAF&&!RS.done){var cv=document.getElementById('cv');cv.width=cv.offsetWidth;cv.height=cv.offsetHeight;}
});
</script>
