<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disney Pixar Cars 3 - Racing Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    font-family: 'Arial Black', Arial, sans-serif;
    color: #fff;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

  /* ===== INTRO SCREEN ===== */
  #intro {
    background: radial-gradient(ellipse at center, #1a0a00 0%, #0a0a1a 70%);
    position: relative;
    overflow: hidden;
  }
  #intro::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,200,0,0.03) 60px, rgba(255,200,0,0.03) 61px),
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,200,0,0.03) 60px, rgba(255,200,0,0.03) 61px);
  }
  .intro-logo {
    text-align: center;
    animation: logoBounce 2s ease-in-out infinite alternate;
    z-index: 1;
  }
  .intro-logo .disney-text {
    font-size: clamp(14px, 3vw, 22px);
    letter-spacing: 8px;
    color: #ccc;
    margin-bottom: 4px;
  }
  .intro-logo .cars-title {
    font-size: clamp(60px, 15vw, 120px);
    font-weight: 900;
    color: #c8000a;
    text-shadow: 0 0 40px #ff4400, 4px 4px 0 #800000, 6px 6px 0 #500000;
    line-height: 1;
    letter-spacing: -4px;
  }
  .intro-logo .num3 {
    font-size: clamp(80px, 18vw, 150px);
    color: #c8c8c8;
    text-shadow: 0 0 30px #aaa, 4px 4px 0 #555, 6px 6px 0 #333;
    display: inline-block;
    transform: rotate(-8deg) translateY(10px);
  }
  .intro-subtitle {
    font-size: clamp(13px, 2.5vw, 18px);
    color: #ffd700;
    letter-spacing: 4px;
    margin: 24px 0 40px;
    text-align: center;
  }
  .btn-start {
    padding: 18px 60px;
    font-size: clamp(16px, 3vw, 22px);
    font-weight: 900;
    font-family: 'Arial Black', Arial, sans-serif;
    background: linear-gradient(135deg, #c8000a, #ff3300);
    color: #fff;
    border: 3px solid #ffd700;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(200,0,10,0.5);
  }
  .btn-start:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 30px rgba(200,0,10,0.8), 0 0 20px #ffd700;
  }
  @keyframes logoBounce {
    from { transform: translateY(-8px); }
    to { transform: translateY(8px); }
  }

  /* ===== CAR SELECT SCREEN ===== */
  #select {
    background: radial-gradient(ellipse at top, #1a0a00 0%, #050510 80%);
    padding: 20px;
  }
  .select-header {
    text-align: center;
    margin-bottom: 24px;
  }
  .select-header h1 {
    font-size: clamp(22px, 5vw, 42px);
    color: #ffd700;
    text-shadow: 2px 2px 0 #996600;
    letter-spacing: 3px;
  }
  .select-header p {
    color: #aaa;
    font-size: 14px;
    margin-top: 6px;
  }
  .cars-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 14px;
    max-width: 1100px;
    width: 100%;
    padding: 0 10px;
  }
  .car-card {
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 14px 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .car-card:hover {
    border-color: #ffd700;
    background: rgba(255,215,0,0.12);
    transform: translateY(-4px) scale(1.03);
    box-shadow: 0 8px 24px rgba(255,215,0,0.3);
  }
  .car-card.selected {
    border-color: #ffd700;
    background: rgba(255,215,0,0.2);
    box-shadow: 0 0 20px rgba(255,215,0,0.6);
  }
  .car-card .car-emoji {
    font-size: 44px;
    display: block;
    margin-bottom: 8px;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  }
  .car-card .car-name {
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
    line-height: 1.3;
  }
  .car-card .car-num {
    font-size: 9px;
    color: #ffd700;
    margin-top: 3px;
  }
  .car-card .car-stats {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 8px;
  }
  .stat-bar {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
    max-width: 28px;
  }
  .stat-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s;
  }
  .selected-badge {
    position: absolute;
    top: 6px; right: 6px;
    font-size: 14px;
    display: none;
  }
  .car-card.selected .selected-badge { display: block; }
  .btn-race {
    margin-top: 24px;
    padding: 16px 56px;
    font-size: clamp(15px, 3vw, 20px);
    font-weight: 900;
    font-family: 'Arial Black', Arial, sans-serif;
    background: linear-gradient(135deg, #ffd700, #ff8800);
    color: #1a0a00;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.2s;
    opacity: 0.4;
    pointer-events: none;
  }
  .btn-race.ready {
    opacity: 1;
    pointer-events: all;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .btn-race.ready:hover { transform: scale(1.06); }
  @keyframes pulse {
    0%,100% { box-shadow: 0 4px 20px rgba(255,215,0,0.4); }
    50% { box-shadow: 0 4px 30px rgba(255,215,0,0.9), 0 0 40px rgba(255,136,0,0.5); }
  }

  /* ===== RACE SCREEN ===== */
  #race {
    background: #0a0a0a;
    flex-direction: column;
    padding: 0;
    overflow: hidden;
  }
  .hud {
    width: 100%;
    background: rgba(0,0,0,0.85);
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #ffd700;
  }
  .hud-item { text-align: center; }
  .hud-label { font-size: 10px; color: #888; letter-spacing: 2px; }
  .hud-value { font-size: clamp(16px, 3vw, 24px); font-weight: 900; color: #ffd700; }
  .lap-display { color: #fff; }
  .pos-display { color: #ff4400; }

  /* ROAD */
  .race-viewport {
    flex: 1;
    position: relative;
    width: 100%;
    overflow: hidden;
  }
  #raceCanvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Mobile controls */
  .mobile-controls {
    display: none;
    width: 100%;
    background: rgba(0,0,0,0.9);
    padding: 12px 20px;
    border-top: 2px solid #333;
    justify-content: space-between;
    gap: 12px;
  }
  @media (max-width: 768px) { .mobile-controls { display: flex; } }
  .ctrl-btn {
    flex: 1;
    padding: 16px 8px;
    font-size: 20px;
    font-weight: 900;
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    color: #fff;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    active-transform: scale(0.95);
    transition: background 0.1s;
  }
  .ctrl-btn:active { background: rgba(255,215,0,0.3); border-color: #ffd700; }
  .ctrl-btn.gas { background: rgba(255,68,0,0.25); border-color: #ff4400; }
  .ctrl-btn.gas:active { background: rgba(255,68,0,0.6); }

  /* ===== RESULT SCREEN ===== */
  #result {
    background: radial-gradient(ellipse at center, #0d1a0a 0%, #050510 70%);
    text-align: center;
    padding: 30px 20px;
  }
  .result-trophy { font-size: 80px; animation: trophySpin 2s ease-in-out infinite alternate; }
  @keyframes trophySpin {
    from { transform: rotate(-10deg) scale(1); }
    to { transform: rotate(10deg) scale(1.1); }
  }
  .result-title {
    font-size: clamp(28px, 7vw, 56px);
    font-weight: 900;
    margin: 16px 0 8px;
  }
  .result-title.win { color: #ffd700; text-shadow: 0 0 30px #ffd700; }
  .result-title.lose { color: #ff4400; }
  .result-stats {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin: 24px 0;
    flex-wrap: wrap;
  }
  .res-stat {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 14px 24px;
    min-width: 100px;
  }
  .res-stat .rs-val { font-size: 28px; font-weight: 900; color: #ffd700; }
  .res-stat .rs-lbl { font-size: 11px; color: #888; margin-top: 4px; letter-spacing: 2px; }
  .result-btns { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
  .btn-again, .btn-menu {
    padding: 14px 40px;
    font-size: 16px;
    font-weight: 900;
    font-family: 'Arial Black', Arial, sans-serif;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .btn-again { background: linear-gradient(135deg,#c8000a,#ff3300); color:#fff; border: 2px solid #ffd700; }
  .btn-menu { background: transparent; color: #ffd700; border: 2px solid #ffd700; }
  .btn-again:hover, .btn-menu:hover { transform: scale(1.05); }

  /* Countdown overlay */
  #countdown {
    position: fixed; inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    font-size: clamp(80px, 25vw, 200px);
    font-weight: 900;
    color: #ffd700;
    text-shadow: 0 0 40px #ffd700;
    animation: cdPop 0.5s ease-out;
  }
  #countdown.show { display: flex; }
  @keyframes cdPop { from { transform: scale(2); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro" class="screen active">
  <div class="intro-logo">
    <div class="disney-text">DISNEY · PIXAR</div>
    <div class="cars-title">Cars<span class="num3">3</span></div>
  </div>
  <div class="intro-subtitle">🏁 RACING CHAMPIONSHIP 🏁</div>
  <button class="btn-start" onclick="showSelect()">START GAME</button>
</div>

<!-- CAR SELECT -->
<div id="select" class="screen">
  <div class="select-header">
    <h1>🏎️ CHOOSE YOUR CAR</h1>
    <p>Select your racer to enter the championship</p>
  </div>
  <div class="cars-grid" id="carsGrid"></div>
  <button class="btn-race" id="btnRace" onclick="startRace()">🏁 RACE!</button>
</div>

<!-- RACE -->
<div id="race" class="screen">
  <div class="hud">
    <div class="hud-item"><div class="hud-label">LAP</div><div class="hud-value lap-display" id="hudLap">1/3</div></div>
    <div class="hud-item"><div class="hud-label">SPEED</div><div class="hud-value" id="hudSpeed">0 MPH</div></div>
    <div class="hud-item" style="text-align:center">
      <div style="font-size:clamp(11px,2vw,16px); font-weight:900; color:#ffd700;" id="playerCarName">MCQUEEN</div>
      <div style="font-size:clamp(22px,6vw,44px);" id="playerCarEmoji">🚗</div>
    </div>
    <div class="hud-item"><div class="hud-label">POSITION</div><div class="hud-value pos-display" id="hudPos">1st</div></div>
    <div class="hud-item"><div class="hud-label">TIME</div><div class="hud-value" id="hudTime">0:00</div></div>
  </div>
  <div class="race-viewport">
    <canvas id="raceCanvas"></canvas>
  </div>
  <div class="mobile-controls">
    <button class="ctrl-btn" ontouchstart="keys.left=true" ontouchend="keys.left=false" onmousedown="keys.left=true" onmouseup="keys.left=false">◀ LEFT</button>
    <button class="ctrl-btn gas" ontouchstart="keys.up=true" ontouchend="keys.up=false" onmousedown="keys.up=true" onmouseup="keys.up=false">⛽ GAS</button>
    <button class="ctrl-btn" ontouchstart="keys.brake=true" ontouchend="keys.brake=false" onmousedown="keys.brake=true" onmouseup="keys.brake=false">🛑 BRAKE</button>
    <button class="ctrl-btn" ontouchstart="keys.right=true" ontouchend="keys.right=false" onmousedown="keys.right=true" onmouseup="keys.right=false">RIGHT ▶</button>
  </div>
</div>

<!-- RESULT -->
<div id="result" class="screen">
  <div class="result-trophy" id="resTrophy">🏆</div>
  <div class="result-title" id="resTitle">YOU WIN!</div>
  <div id="resPlayerCar" style="font-size:60px; margin:10px 0;"></div>
  <div class="result-stats">
    <div class="res-stat"><div class="rs-val" id="resPos">1st</div><div class="rs-lbl">POSITION</div></div>
    <div class="res-stat"><div class="rs-val" id="resTime">0:00</div><div class="rs-lbl">BEST LAP</div></div>
    <div class="res-stat"><div class="rs-val" id="resLaps">3</div><div class="rs-lbl">LAPS</div></div>
  </div>
  <div class="result-btns">
    <button class="btn-again" onclick="startRace()">🔁 RACE AGAIN</button>
    <button class="btn-menu" onclick="showSelect()">🚗 CHANGE CAR</button>
  </div>
</div>

<!-- COUNTDOWN -->
<div id="countdown"></div>

<script>
/* ==================== CARS DATA ==================== */
const CARS = [
  { name:"Lightning McQueen", num:"#95", emoji:"🏎️", color:"#c8000a", speed:9, handling:7, boost:9 },
  { name:"Mater", num:"TOW", emoji:"🚜", color:"#8B6914", speed:5, handling:6, boost:7 },
  { name:"Sally Carrera", num:"", emoji:"🩵", color:"#4a90d9", speed:7, handling:9, boost:6 },
  { name:"Doc Hudson", num:"#51", emoji:"🚗", color:"#1a3a6e", speed:8, handling:8, boost:7 },
  { name:"Jackson Storm", num:"#20", emoji:"🖤", color:"#1a1a2e", speed:10, handling:8, boost:10 },
  { name:"Cruz Ramirez", num:"#51", emoji:"💛", color:"#ffd700", speed:9, handling:9, boost:8 },
  { name:"Chick Hicks", num:"#86", emoji:"💚", color:"#1a6e1a", speed:8, handling:7, boost:7 },
  { name:"The King", num:"#43", emoji:"💙", color:"#1a4a8e", speed:8, handling:8, boost:7 },
  { name:"Mack", num:"MACK", emoji:"🚛", color:"#c8000a", speed:4, handling:5, boost:5 },
  { name:"Ramone", num:"", emoji:"🟣", color:"#6a1a8e", speed:6, handling:8, boost:6 },
  { name:"Flo", num:"", emoji:"🟡", color:"#f4a015", speed:6, handling:8, boost:7 },
  { name:"Luigi", num:"", emoji:"🟢", color:"#1a7a1a", speed:6, handling:7, boost:6 },
  { name:"Guido", num:"", emoji:"🔵", color:"#1a6e9e", speed:5, handling:6, boost:8 },
  { name:"Fillmore", num:"", emoji:"🌿", color:"#4a8e1a", speed:5, handling:6, boost:6 },
  { name:"Sarge", num:"", emoji:"🟫", color:"#4a6e1a", speed:6, handling:7, boost:6 },
  { name:"Sheriff", num:"", emoji:"🖤", color:"#1a1a1a", speed:6, handling:7, boost:5 },
  { name:"Strip Weathers", num:"#43", emoji:"🔵", color:"#1a5a8e", speed:8, handling:8, boost:7 },
  { name:"Chuki", num:"", emoji:"🔴", color:"#8e1a1a", speed:7, handling:7, boost:7 },
  { name:"Smokey", num:"", emoji:"🟤", color:"#6e4a1a", speed:7, handling:9, boost:7 },
  { name:"Natalie Certain", num:"", emoji:"🟡", color:"#c8a800", speed:7, handling:7, boost:7 },
  { name:"Brick Yardley", num:"", emoji:"🟠", color:"#c86400", speed:7, handling:7, boost:7 },
  { name:"Daniel Swervez", num:"", emoji:"🔵", color:"#1a6e9e", speed:8, handling:8, boost:7 },
  { name:"Ryan Laney", num:"", emoji:"💜", color:"#6a1a9e", speed:8, handling:7, boost:8 },
  { name:"Dave Rubins", num:"", emoji:"🟢", color:"#1a8e4a", speed:7, handling:7, boost:7 },
  { name:"Bobby Swift", num:"", emoji:"🟣", color:"#7a1a8e", speed:8, handling:7, boost:8 },
  { name:"Cam Spinner", num:"", emoji:"🟡", color:"#c8a200", speed:8, handling:8, boost:8 },
  { name:"Miss Fritter", num:"", emoji:"🚌", color:"#c87800", speed:6, handling:5, boost:9 },
];

/* ==================== AUDIO ==================== */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
function getACtx() {
  try {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
    return actx;
  } catch(e) { return null; }
}

function playTone(freq, type, dur, vol=0.3, detune=0) {
  try {
    const ctx = getACtx();
    if (!ctx) return;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type;
    o.frequency.value = freq;
    o.detune.value = detune;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(); o.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function playEngineRevSound(speed) {
  try {
    const ctx = getACtx();
    if (!ctx) return;
    const baseFreq = 60 + speed * 18;
    const o = ctx.createOscillator();
    const o2 = ctx.createOscillator();
    const g = ctx.createGain();
    const dist = ctx.createWaveShaper();
    const curve = new Float32Array(256);
    for (let i = 0; i < 256; i++) curve[i] = (i < 128) ? -1 + i/64 : (i-128)/64;
    dist.curve = curve;
    o.connect(dist); o2.connect(dist); dist.connect(g); g.connect(ctx.destination);
    o.type = 'sawtooth'; o.frequency.value = baseFreq;
    o2.type = 'square'; o2.frequency.value = baseFreq * 1.5;
    g.gain.setValueAtTime(0.08, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
    o.start(); o.stop(ctx.currentTime + 0.12);
    o2.start(); o2.stop(ctx.currentTime + 0.12);
  } catch(e) {}
}

function playSelectSound() { playTone(440, 'sine', 0.15, 0.25); setTimeout(()=>playTone(660,'sine',0.15,0.25),100); }
function playMenuClickSound() { playTone(300, 'triangle', 0.12, 0.3); }
function playCountdownBeep(n) {
  if (n > 0) playTone(440, 'sine', 0.3, 0.5);
  else { playTone(880,'sine',0.1,0.5); setTimeout(()=>playTone(1100,'sine',0.1,0.5),100); setTimeout(()=>playTone(1320,'sine',0.2,0.5),200); }
}
function playCollisionSound() {
  playTone(200,'sawtooth',0.2,0.4);
  playTone(150,'sawtooth',0.3,0.3,100);
}
function playBoostSound() {
  playTone(300,'sawtooth',0.05,0.2); 
  setTimeout(()=>playTone(500,'sawtooth',0.05,0.2),50);
  setTimeout(()=>playTone(700,'sawtooth',0.1,0.25),100);
}
function playFinishSound(won) {
  if (won) {
    [523,659,784,1047].forEach((f,i) => setTimeout(()=>playTone(f,'sine',0.3,0.4),i*150));
  } else {
    [300,250,200].forEach((f,i) => setTimeout(()=>playTone(f,'sawtooth',0.3,0.3),i*200));
  }
}
function playLapSound() {
  playTone(880,'sine',0.1,0.4); setTimeout(()=>playTone(1100,'sine',0.15,0.4),100);
}

/* ==================== GAME STATE ==================== */
let selectedCar = null;
let gameRunning = false;
let animId = null;
let keys = { up:false, left:false, right:false, brake:false };

/* ==================== SCREENS ==================== */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showSelect() {
  buildCarGrid();
  showScreen('select');
  setTimeout(() => { try { playMenuClickSound(); } catch(e){} }, 100);
}
function showResult(won, pos, time, laps) {
  document.getElementById('resTrophy').textContent = won ? '🏆' : '🎖️';
  document.getElementById('resTitle').textContent = won ? '🏆 YOU WIN! 🏆' : '😤 RACE OVER';
  document.getElementById('resTitle').className = 'result-title ' + (won ? 'win' : 'lose');
  document.getElementById('resPlayerCar').textContent = selectedCar ? selectedCar.emoji : '🏎️';
  document.getElementById('resPos').textContent = ordinal(pos);
  document.getElementById('resTime').textContent = formatTime(time);
  document.getElementById('resLaps').textContent = laps;
  showScreen('result');
  playFinishSound(won);
}
function ordinal(n) { return ['','1st','2nd','3rd','4th','5th','6th','7th','8th'][n] || n+'th'; }
function formatTime(ms) {
  const s = Math.floor(ms/1000); const m = Math.floor(s/60);
  return m+':'+(s%60<10?'0':'')+(s%60);
}

/* ==================== BUILD CAR GRID ==================== */
function buildCarGrid() {
  const grid = document.getElementById('carsGrid');
  grid.innerHTML = '';
  CARS.forEach((c,i) => {
    const card = document.createElement('div');
    card.className = 'car-card';
    if (selectedCar && selectedCar.name === c.name) card.classList.add('selected');
    const statColors = ['#c8000a','#1a6e9e','#1a8e4a'];
    card.innerHTML = `
      <span class="selected-badge">✓</span>
      <span class="car-emoji">${c.emoji}</span>
      <div class="car-name">${c.name}</div>
      <div class="car-num">${c.num}</div>
      <div class="car-stats">
        <div class="stat-bar"><div class="stat-bar-fill" style="width:${c.speed*10}%;background:${statColors[0]}"></div></div>
        <div class="stat-bar"><div class="stat-bar-fill" style="width:${c.handling*10}%;background:${statColors[1]}"></div></div>
        <div class="stat-bar"><div class="stat-bar-fill" style="width:${c.boost*10}%;background:${statColors[2]}"></div></div>
      </div>
    `;
    card.addEventListener('click', () => selectCar(i, card));
    grid.appendChild(card);
  });
}

function selectCar(i, card) {
  playSelectSound();
  selectedCar = CARS[i];
  document.querySelectorAll('.car-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  const btn = document.getElementById('btnRace');
  btn.classList.add('ready');
  btn.textContent = `🏁 RACE AS ${selectedCar.name.toUpperCase().split(' ')[0]}!`;
}

/* ==================== RACE GAME ==================== */
const TOTAL_LAPS = 3;
const NUM_OPPONENTS = 5;
const ROAD_W = 600;

let raceState = {};

function startRace() {
  if (!selectedCar) return;
  playMenuClickSound();
  showScreen('race');
  if (animId) cancelAnimationFrame(animId);

  document.getElementById('playerCarName').textContent = selectedCar.name.split(' ')[0].toUpperCase();
  document.getElementById('playerCarEmoji').textContent = selectedCar.emoji;

  const canvas = document.getElementById('raceCanvas');
  canvas.width = canvas.offsetWidth || window.innerWidth;
  canvas.height = canvas.offsetHeight || (window.innerHeight - 120);

  // Init race state
  raceState = {
    lap: 1,
    progress: 0,
    speed: 0,
    maxSpeed: 3 + selectedCar.speed * 0.5,
    accel: 0.06 + selectedCar.speed * 0.005,
    handling: selectedCar.handling,
    x: canvas.width / 2,
    y: canvas.height * 0.75,
    angle: 0,
    roadOffset: 0,
    startTime: null,
    lapTime: 0,
    totalTime: 0,
    boostTimer: 0,
    collideTimer: 0,
    lapProgress: 0,
    gameOver: false,
    won: false,
    bgOffset: 0,
    opponents: [],
    position: 1,
    finishTime: 0,
    rumble: 0,
    engineSoundTimer: 0,
    coins: [],
    coinsCollected: 0,
    oilSlicks: [],
    spinTimer: 0,
  };

  // Create opponents
  for (let i = 0; i < NUM_OPPONENTS; i++) {
    const oc = CARS.filter(c => c.name !== selectedCar.name)[Math.floor(Math.random() * (CARS.length-1))];
    raceState.opponents.push({
      car: oc,
      progress: 0,
      x: canvas.width/2 + (Math.random()-0.5)*200,
      speed: 2 + Math.random()*2,
      lap: 1,
      laneOffset: (Math.random()-0.5)*160,
      wobble: Math.random()*Math.PI*2,
      done: false,
    });
  }

  // Spawn coins & oil slicks
  for (let i = 0; i < 12; i++) {
    raceState.coins.push({
      x: canvas.width/2 + (Math.random()-0.5)*300,
      roadY: Math.random(),
      collected: false,
      anim: 0,
    });
  }
  for (let i = 0; i < 5; i++) {
    raceState.oilSlicks.push({
      x: canvas.width/2 + (Math.random()-0.5)*260,
      roadY: Math.random()+0.1,
      active: true,
    });
  }

  // Countdown
  let count = 3;
  const cd = document.getElementById('countdown');
  cd.classList.add('show');
  cd.textContent = count;
  playCountdownBeep(count);
  const cdInterval = setInterval(() => {
    count--;
    if (count > 0) {
      cd.style.animation = 'none'; void cd.offsetWidth; cd.style.animation = 'cdPop 0.5s ease-out';
      cd.textContent = count;
      playCountdownBeep(count);
    } else {
      cd.textContent = 'GO!';
      cd.style.color = '#00ff00';
      playCountdownBeep(0);
      clearInterval(cdInterval);
      setTimeout(() => {
        cd.classList.remove('show');
        cd.style.color = '#ffd700';
        raceState.startTime = performance.now();
        gameRunning = true;
        gameLoop();
      }, 700);
    }
  }, 1000);
}

/* ==================== MAIN GAME LOOP ==================== */
function gameLoop() {
  if (!gameRunning) return;
  const canvas = document.getElementById('raceCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth || window.innerWidth;
  canvas.height = canvas.offsetHeight || (window.innerHeight - 120);
  update(canvas);
  draw(canvas, ctx);
  animId = requestAnimationFrame(gameLoop);
}

function update(canvas) {
  const rs = raceState;
  const now = performance.now();
  rs.totalTime = now - rs.startTime;

  if (rs.spinTimer > 0) { rs.spinTimer--; rs.angle += 0.15; return; }

  // Input
  const accel = rs.boostTimer > 0 ? rs.accel * 1.8 : rs.accel;
  const maxSpd = rs.boostTimer > 0 ? rs.maxSpeed * 1.5 : rs.maxSpeed;
  if (keys.up) rs.speed = Math.min(rs.speed + accel, maxSpd);
  else if (keys.brake) rs.speed = Math.max(rs.speed - rs.accel * 2, 0);
  else rs.speed = Math.max(rs.speed - rs.accel * 0.4, 0);

  if (rs.boostTimer > 0) rs.boostTimer--;

  const turnSpeed = (0.02 + rs.handling * 0.002) * (rs.speed / (rs.maxSpeed + 0.01));
  if (keys.left) { rs.x -= rs.speed * 2.5; rs.angle = -0.3; }
  else if (keys.right) { rs.x += rs.speed * 2.5; rs.angle = 0.3; }
  else rs.angle *= 0.7;

  // Road bounds
  const roadLeft = canvas.width/2 - ROAD_W/2 + 40;
  const roadRight = canvas.width/2 + ROAD_W/2 - 40;
  if (rs.x < roadLeft) { rs.x = roadLeft; rs.speed *= 0.7; if (rs.collideTimer <= 0) { playCollisionSound(); rs.collideTimer = 30; rs.rumble = 20; } }
  if (rs.x > roadRight) { rs.x = roadRight; rs.speed *= 0.7; if (rs.collideTimer <= 0) { playCollisionSound(); rs.collideTimer = 30; rs.rumble = 20; } }
  if (rs.collideTimer > 0) rs.collideTimer--;
  if (rs.rumble > 0) rs.rumble--;

  // Progress
  rs.lapProgress += rs.speed * 0.003;
  rs.bgOffset = (rs.bgOffset + rs.speed * 2) % canvas.height;

  // Lap complete (full rotation = 100 progress units)
  if (rs.lapProgress >= 100) {
    rs.lapProgress = 0;
    rs.lap++;
    playLapSound();
    if (rs.lap > TOTAL_LAPS) {
      rs.gameOver = true;
      rs.finishTime = rs.totalTime;
      // calc position
      rs.position = 1 + raceState.opponents.filter(o => o.progress >= 100 * TOTAL_LAPS).length;
      gameRunning = false;
      cancelAnimationFrame(animId);
      setTimeout(() => showResult(rs.position === 1, rs.position, rs.finishTime, TOTAL_LAPS), 800);
      return;
    }
  }

  // Engine sound
  rs.engineSoundTimer++;
  if (rs.engineSoundTimer >= Math.max(4, 14 - Math.floor(rs.speed))) {
    rs.engineSoundTimer = 0;
    playEngineRevSound(rs.speed);
  }

  // Opponents
  rs.opponents.forEach(op => {
    if (op.done) return;
    op.wobble += 0.04;
    op.x = canvas.width/2 + op.laneOffset + Math.sin(op.wobble)*20;
    op.progress += op.speed * 0.003;
    if (op.progress >= 100 * TOTAL_LAPS) op.done = true;
  });

  // Coins
  rs.coins.forEach(coin => {
    if (coin.collected) return;
    coin.anim++;
    const screenY = canvas.height * 0.3 + (coin.roadY * 600 - rs.bgOffset % 600);
    if (Math.abs(rs.x - coin.x) < 30 && Math.abs(canvas.height*0.75 - screenY) < 40) {
      coin.collected = true;
      rs.coinsCollected++;
      rs.boostTimer = 80;
      playBoostSound();
    }
  });

  // Oil slicks
  rs.oilSlicks.forEach(oil => {
    if (!oil.active) return;
    const screenY = canvas.height * 0.3 + (oil.roadY * 600 - rs.bgOffset % 600);
    if (Math.abs(rs.x - oil.x) < 36 && Math.abs(canvas.height*0.75 - screenY) < 36) {
      oil.active = false;
      rs.spinTimer = 40;
      playCollisionSound();
    }
  });

  // Update HUD
  const displaySpeed = Math.round(rs.speed * 30);
  document.getElementById('hudSpeed').textContent = displaySpeed + ' MPH';
  document.getElementById('hudLap').textContent = Math.min(rs.lap, TOTAL_LAPS) + '/' + TOTAL_LAPS;
  const activeOps = rs.opponents.filter(o => o.progress > rs.lapProgress + (rs.lap-1)*100).length;
  rs.position = activeOps + 1;
  document.getElementById('hudPos').textContent = ordinal(rs.position);
  document.getElementById('hudTime').textContent = formatTime(rs.totalTime);
}

/* ==================== DRAW ==================== */
function draw(canvas, ctx) {
  const rs = raceState;
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Sky gradient
  const sky = ctx.createLinearGradient(0,0,0,H*0.5);
  sky.addColorStop(0,'#1a0a30');
  sky.addColorStop(1,'#3a1a0a');
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H*0.5);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i=0;i<30;i++) { ctx.fillRect(((i*137+rs.bgOffset*0.02)%W),(i*73)%(H*0.4),1.5,1.5); }

  // Horizon glow
  ctx.fillStyle = 'rgba(200,100,0,0.25)';
  ctx.fillRect(0, H*0.42, W, H*0.08);

  // Road
  const roadX = W/2 - ROAD_W/2;
  const roadGrad = ctx.createLinearGradient(0, H*0.45, 0, H);
  roadGrad.addColorStop(0,'#2a2a2a');
  roadGrad.addColorStop(1,'#1a1a1a');
  ctx.fillStyle = roadGrad;
  ctx.fillRect(roadX, H*0.45, ROAD_W, H*0.55);

  // Road stripes
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 3;
  ctx.setLineDash([40,30]);
  ctx.lineDashOffset = -(rs.bgOffset % 70);
  ctx.beginPath();
  ctx.moveTo(W/2, H*0.45); ctx.lineTo(W/2, H);
  ctx.stroke();
  ctx.setLineDash([]);

  // Road edge lines
  ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 4;
  ctx.strokeRect(roadX+4, H*0.45, ROAD_W-8, H*0.55);

  // Rumble strips
  if (rs.rumble > 0) {
    ctx.fillStyle = `rgba(255,80,0,${rs.rumble/20 * 0.4})`;
    ctx.fillRect(0,0,W,H);
  }

  // Coins
  rs.coins.forEach(coin => {
    if (coin.collected) return;
    const screenY = H * 0.5 + (((coin.roadY * 600 - rs.bgOffset) % 600 + 600) % 600) * (H*0.5/600);
    if (screenY < H*0.45 || screenY > H) return;
    const scale = 0.4 + (screenY-H*0.45)/(H*0.55) * 0.6;
    const cx = W/2 + (coin.x - W/2) * scale;
    ctx.save();
    ctx.translate(cx, screenY);
    ctx.scale(scale, scale);
    ctx.font = '20px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('⚡', 0, 0);
    ctx.restore();
  });

  // Oil slicks
  rs.oilSlicks.forEach(oil => {
    if (!oil.active) return;
    const screenY = H * 0.5 + (((oil.roadY * 600 - rs.bgOffset) % 600 + 600) % 600) * (H*0.5/600);
    if (screenY < H*0.45 || screenY > H) return;
    const scale = 0.4 + (screenY-H*0.45)/(H*0.55) * 0.6;
    const cx = W/2 + (oil.x - W/2) * scale;
    ctx.save();
    ctx.translate(cx, screenY);
    ctx.scale(scale, scale);
    ctx.fillStyle = 'rgba(80,20,120,0.7)';
    ctx.beginPath(); ctx.ellipse(0,0,22,10,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Opponent cars (draw behind player)
  rs.opponents.forEach(op => {
    const relProgress = op.progress - (rs.lap-1)*100;
    const relPlayer = rs.lapProgress;
    const diff = relPlayer - relProgress;
    if (diff < -5 || diff > 60) return;
    const screenY = H * 0.75 - diff * 4.5;
    if (screenY < H*0.45 || screenY > H+20) return;
    const scale = 0.35 + (screenY-H*0.45)/(H*0.55) * 0.65;
    const cx = W/2 + (op.x - W/2) * scale;
    drawCar(ctx, cx, screenY, scale, op.car.emoji, op.car.color, 0);
  });

  // Player car
  const playerX = rs.x;
  const playerY = H * 0.75;
  const shake = rs.rumble > 0 ? (Math.random()-0.5)*6 : 0;
  drawCar(ctx, playerX+shake, playerY+shake, 1.0, selectedCar.emoji, selectedCar.color, rs.angle);

  // Boost flames
  if (rs.boostTimer > 0) {
    ctx.save();
    ctx.translate(playerX, playerY+24);
    ctx.font = Math.floor(16+Math.random()*8)+'px serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🔥', 0, 0);
    ctx.restore();
  }

  // Mini-map
  drawMiniMap(ctx, W, H, rs);

  // Speed boost indicator
  if (rs.boostTimer > 0) {
    ctx.fillStyle = 'rgba(255,215,0,0.15)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 16px Arial'; ctx.textAlign = 'left';
    ctx.fillText('⚡ BOOST!', 16, H-60);
  }
}

function drawCar(ctx, x, y, scale, emoji, color, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  ctx.rotate(angle * 0.3);
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(0, 18, 22*scale, 8*scale, 0, 0, Math.PI*2);
  ctx.fill();
  // Car body
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(-20, -12, 40, 24, 8);
  ctx.fill();
  // Windshield
  ctx.fillStyle = 'rgba(150,220,255,0.7)';
  ctx.fillRect(-8, -10, 18, 10);
  // Wheels
  ctx.fillStyle = '#111';
  [[-16,-14],[16,-14],[-16,14],[16,14]].forEach(([wx,wy]) => {
    ctx.beginPath(); ctx.ellipse(wx, wy, 5, 4, 0, 0, Math.PI*2); ctx.fill();
  });
  // Emoji on top
  ctx.font = `${Math.round(22*scale)}px serif`; 
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(emoji, 0, -2);
  ctx.restore();
}

function drawMiniMap(ctx, W, H, rs) {
  const mx = W-90, my = 16, mw = 76, mh = 76;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.beginPath(); ctx.roundRect(mx,my,mw,mh,8); ctx.fill();
  ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1.5;
  ctx.stroke();
  // Track circle
  ctx.strokeStyle = '#555'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(mx+mw/2, my+mh/2, 26, 0, Math.PI*2); ctx.stroke();
  // Player dot
  const ang = (rs.lapProgress / 100) * Math.PI * 2 - Math.PI/2;
  const px = mx+mw/2 + Math.cos(ang)*26;
  const py = my+mh/2 + Math.sin(ang)*26;
  ctx.fillStyle = '#ffd700';
  ctx.beginPath(); ctx.arc(px,py,5,0,Math.PI*2); ctx.fill();
  // Opponents
  rs.opponents.forEach(op => {
    const oa = (op.progress/100) * Math.PI*2 - Math.PI/2;
    const ox = mx+mw/2 + Math.cos(oa)*26;
    const oy = my+mh/2 + Math.sin(oa)*26;
    ctx.fillStyle = op.car.color || '#f00';
    ctx.beginPath(); ctx.arc(ox,oy,3,0,Math.PI*2); ctx.fill();
  });
  // Lap dots
  ctx.fillStyle = '#aaa'; ctx.font = '9px Arial'; ctx.textAlign='center';
  ctx.fillText('LAP '+Math.min(rs.lap,TOTAL_LAPS), mx+mw/2, my+mh+13);
}

/* ==================== KEYBOARD ==================== */
document.addEventListener('keydown', e => {
  if (e.code==='ArrowUp'||e.code==='KeyW') keys.up = true;
  if (e.code==='ArrowLeft'||e.code==='KeyA') keys.left = true;
  if (e.code==='ArrowRight'||e.code==='KeyD') keys.right = true;
  if (e.code==='ArrowDown'||e.code==='KeyS') keys.brake = true;
  e.preventDefault();
});
document.addEventListener('keyup', e => {
  if (e.code==='ArrowUp'||e.code==='KeyW') keys.up = false;
  if (e.code==='ArrowLeft'||e.code==='KeyA') keys.left = false;
  if (e.code==='ArrowRight'||e.code==='KeyD') keys.right = false;
  if (e.code==='ArrowDown'||e.code==='KeyS') keys.brake = false;
});

// Canvas resize
window.addEventListener('resize', () => {
  if (gameRunning) {
    const canvas = document.getElementById('raceCanvas');
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
});

function unlockAudio() { try { if (!actx) { actx = new (window.AudioContext||window.webkitAudioContext)(); } if (actx.state==='suspended') actx.resume(); } catch(e){} }
document.addEventListener('click', unlockAudio);
document.addEventListener('touchstart', unlockAudio);

// roundRect polyfill for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    this.beginPath();
    this.moveTo(x+r,y); this.lineTo(x+w-r,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r); this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h); this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r); this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();
    return this;
  };
}
